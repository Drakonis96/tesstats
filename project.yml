name: Tesstats
options:
  bundleIdPrefix: com.tesstats
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.4"
    CURRENT_PROJECT_VERSION: "5"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_EMIT_LOC_STRINGS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO

targets:
  Tesstats:
    type: application
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "18.0"
      macOS: "15.0"
    sources:
      - path: Tesstats
    dependencies:
      - target: TesstatsWidgets
        embed: true
        destinationFilters: [iOS]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tesstats.app
        PRODUCT_NAME: Tesstats
        INFOPLIST_FILE: Tesstats/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tesstats/Resources/Tesstats.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"

  TesstatsWidgets:
    type: app-extension
    supportedDestinations: [iOS]
    deploymentTarget:
      iOS: "18.0"
    sources:
      - path: TesstatsWidgets
      - path: Tesstats/Shared
      - path: Tesstats/DesignSystem/Theme.swift
      - path: Tesstats/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tesstats.app.widgets
        PRODUCT_NAME: TesstatsWidgets
        INFOPLIST_FILE: TesstatsWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: TesstatsWidgets/TesstatsWidgets.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
